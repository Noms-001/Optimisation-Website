<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Info | Tous les articles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/fo-styles.css">
    <style>
        .article-content {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    

    <div class="container">
        <!-- Barre de recherche -->
        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="Rechercher un article par titre, catégorie ou mot-clé...">
                <button onclick="performSearch()" class="search-btn">Rechercher</button>
                <button onclick="clearSearch()" class="clear-search">Effacer</button>
            </div>
        </div>

        <!-- En-tête des résultats -->
        <div class="results-header">
            <h2>Tous les articles</h2>
            <div class="results-count" id="resultsCount"></div>
        </div>

        <!-- Liste des articles -->
        <div id="articlesContainer" class="articles-list">
            <!-- Les articles seront injectés ici -->
        </div>

        <!-- Pagination -->
        <div id="paginationContainer" class="pagination"></div>
    </div>

    <script>
        // Données des articles (simulation d'une base)
        let allArticles = [];
        let currentSearchTerm = '';
        let currentPage = 1;
        const articlesPerPage = 8;

        // Initialisation des articles (fusion des données existantes + articles de l'admin)
        function initArticles() {
            // Articles par défaut du site
            const defaultArticles = [
                {
                    id: "1",
                    title: "Les enjeux diplomatiques au Moyen-Orient : quel équilibre pour 2026 ?",
                    excerpt: "Analyse des récentes initiatives régionales et du rôle des acteurs internationaux dans la stabilité. Les pourparlers indirects et les efforts de médiation...",
                    category: "Géopolitique",
                    keywords: "diplomatie, moyen-orient, équilibre",
                    coverUrl: "https://placehold.co/600x400/1a1a2e/ffffff?text=Diplomatie",
                    featured: true,
                    date: "28 mars 2026"
                },
                {
                    id: "2",
                    title: "Christophe Castille : 'La coopération économique peut apaiser les tensions'",
                    excerpt: "L'ancien diplomate revient sur les mécanismes de confiance entre États. Interview exclusive sur les corridors commerciaux et la stabilité régionale.",
                    category: "Analyses",
                    keywords: "entretien, économie, paix",
                    coverUrl: "https://placehold.co/600x400/2c3e50/ffffff?text=Interview",
                    featured: false,
                    date: "27 mars 2026"
                },
                {
                    id: "3",
                    title: "L'aide humanitaire en 2025 : chiffres clés et défis logistiques",
                    excerpt: "Les organisations internationales face à l'augmentation des besoins. Rapport annuel sur l'acheminement des ressources et les zones d'ombre.",
                    category: "Humanitaire",
                    keywords: "aide, humanitaire, logistique, ONU",
                    coverUrl: "https://placehold.co/600x400/2d6a4f/ffffff?text=Aide+Humanitaire",
                    featured: false,
                    date: "26 mars 2026"
                },
                {
                    id: "4",
                    title: "Le corridor Nord-Sud : un enjeu stratégique méconnu",
                    excerpt: "Les infrastructures et les routes commerciales redessinent les alliances. Une analyse approfondie des nouvelles routes de la soie et de leur impact géopolitique.",
                    category: "Géopolitique",
                    keywords: "stratégie, commerce, corridors",
                    coverUrl: "https://placehold.co/600x400/1e3c5c/ffffff?text=Corridor",
                    featured: false,
                    date: "25 mars 2026"
                },
                {
                    id: "5",
                    title: "Nouvelle doctrine de dissuasion : quelles évolutions ?",
                    excerpt: "Les équilibres militaires régionaux et l'impact des technologies émergentes sur la stabilité mondiale.",
                    category: "Analyses",
                    keywords: "défense, militaire, dissuasion",
                    coverUrl: "https://placehold.co/600x400/2c3e66/ffffff?text=Defense",
                    featured: false,
                    date: "24 mars 2026"
                },
                {
                    id: "6",
                    title: "Marchés pétroliers : la volatilité en question",
                    excerpt: "Analyse des fluctuations des prix et de l'impact sur les économies régionales et les pays producteurs.",
                    category: "Économie",
                    keywords: "pétrole, marché, énergie",
                    coverUrl: "https://placehold.co/600x400/2b5e3c/ffffff?text=Petrole",
                    featured: false,
                    date: "23 mars 2026"
                },
                {
                    id: "7",
                    title: "ONG : comment protéger les civils en zone de conflit",
                    excerpt: "Les défis rencontrés par les acteurs humanitaires sur le terrain et les mécanismes de protection internationale.",
                    category: "Humanitaire",
                    keywords: "ONG, civils, protection",
                    coverUrl: "https://placehold.co/600x400/4a6d8c/ffffff?text=Humanitaire",
                    featured: false,
                    date: "22 mars 2026"
                },
                {
                    id: "8",
                    title: "Les pourparlers sur le nucléaire : état des lieux",
                    excerpt: "Retour sur les cycles de négociations et la position des différentes capitales dans ce dossier complexe.",
                    category: "Diplomatie",
                    keywords: "nucléaire, négociations, diplomatie",
                    coverUrl: "https://placehold.co/600x400/2c3e50/ffffff?text=Nucleaire",
                    featured: false,
                    date: "21 mars 2026"
                },
                {
                    id: "9",
                    title: "L'économie des conflits : reconstruction et sanctions",
                    excerpt: "Analyse des mécanismes économiques dans les zones post-conflit et l'efficacité des sanctions internationales.",
                    category: "Économie",
                    keywords: "conflits, reconstruction, sanctions",
                    coverUrl: "https://placehold.co/600x400/2d6a4f/ffffff?text=Economie",
                    featured: false,
                    date: "20 mars 2026"
                },
                {
                    id: "10",
                    title: "Reportage : dans les coulisses des négociations à Vienne",
                    excerpt: "Immersion exclusive au cœur des discussions diplomatiques et des jeux d'influence.",
                    category: "Monde",
                    keywords: "reportage, négociations, Vienne",
                    coverUrl: "https://placehold.co/600x400/1a1a2e/ffffff?text=Reportage",
                    featured: false,
                    date: "19 mars 2026"
                }
            ];

            // Récupérer les articles du localStorage (créés depuis l'admin)
            const storedArticles = localStorage.getItem('horizon_articles');
            let adminArticles = [];
            if (storedArticles) {
                try {
                    adminArticles = JSON.parse(storedArticles);
                    // Formater les articles admin pour correspondre au format d'affichage
                    adminArticles = adminArticles.map(art => ({
                        id: art.id,
                        title: art.title,
                        excerpt: art.content ? art.content.substring(0, 160) + '...' : 'Contenu non disponible',
                        category: art.category,
                        keywords: art.keywords,
                        coverUrl: art.coverUrl,
                        featured: art.featured,
                        date: art.createdAt ? new Date(art.createdAt).toLocaleDateString('fr-FR') : new Date().toLocaleDateString('fr-FR')
                    }));
                } catch (e) { }
            }

            // Fusionner les articles (les articles admin sont plus récents, on les met en premier)
            allArticles = [...adminArticles, ...defaultArticles];

            // Déduplication simple par titre (optionnel)
            const uniqueMap = new Map();
            allArticles.forEach(art => {
                if (!uniqueMap.has(art.title)) {
                    uniqueMap.set(art.title, art);
                }
            });
            allArticles = Array.from(uniqueMap.values());
        }

        // Recherche d'articles
        function filterArticles() {
            if (!currentSearchTerm.trim()) {
                return allArticles;
            }
            const term = currentSearchTerm.toLowerCase().trim();
            return allArticles.filter(article => {
                return article.title.toLowerCase().includes(term) ||
                    article.category.toLowerCase().includes(term) ||
                    (article.keywords && article.keywords.toLowerCase().includes(term)) ||
                    (article.excerpt && article.excerpt.toLowerCase().includes(term));
            });
        }

        // Pagination
        function getPaginatedArticles(filtered) {
            const start = (currentPage - 1) * articlesPerPage;
            const end = start + articlesPerPage;
            return filtered.slice(start, end);
        }

        function getTotalPages(filtered) {
            return Math.ceil(filtered.length / articlesPerPage);
        }

        // Rendu des articles
        function renderArticles() {
            const filtered = filterArticles();
            const paginatedArticles = getPaginatedArticles(filtered);
            const container = document.getElementById('articlesContainer');
            const resultsCount = document.getElementById('resultsCount');
            const totalPages = getTotalPages(filtered);

            // Mettre à jour le compteur
            if (filtered.length === 0) {
                resultsCount.innerHTML = '0 article';
            } else {
                resultsCount.innerHTML = `${filtered.length} article${filtered.length > 1 ? 's' : ''}`;
            }

            // Afficher les articles
            if (paginatedArticles.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="no-results-icon" style="font-size: 48px; opacity: 0.5;">📭</i>
                        <p style="margin-top: 16px;">Aucun article ne correspond à votre recherche.</p>
                        <p style="font-size: 14px;">Essayez d'autres mots-clés ou consultez tous nos articles.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = paginatedArticles.map(article => `
                <div class="article-row">
                    <div class="article-image">
                        <img src="${article.coverUrl || 'https://placehold.co/600x400/f5f5f5/cccccc?text=Article'}" alt="${escapeHtml(article.title)}" onerror="this.src='https://placehold.co/600x400/f5f5f5/cccccc?text=Image'">
                    </div>
                    <div class="article-content">
                        <div class="article-category">
                            ${escapeHtml(article.category)}
                            ${article.featured ? '<span class="featured-badge">À la une</span>' : ''}
                        </div>
                        <a href="#" class="article-title">
                            ${escapeHtml(article.title)}
                        </a>
                        <p class="article-excerpt">${escapeHtml(article.excerpt)}</p>
                        <div class="article-meta">
                            <span><i class='bi bi-calendar2-week'></i> ${article.date || 'Date non définie'}</span>
                            ${article.keywords ? `<span><i class='bi bi-tag'></i> ${escapeHtml(article.keywords.split(',').slice(0, 3).join(', '))}</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');

            // Rendu de la pagination
            renderPagination(filtered);
        }

        function renderPagination(filtered) {
            const totalPages = getTotalPages(filtered);
            const paginationContainer = document.getElementById('paginationContainer');

            if (totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let paginationHtml = '';

            // Bouton Précédent
            paginationHtml += `
                <button class="page-btn ${currentPage === 1 ? 'disabled' : ''}" 
                        onclick="${currentPage > 1 ? `goToPage(${currentPage - 1})` : ''}">
                    ←
                </button>
            `;

            // Pages
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    paginationHtml += `
                        <button class="page-btn ${i === currentPage ? 'active' : ''}" 
                                onclick="goToPage(${i})">
                            ${i}
                        </button>
                    `;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    paginationHtml += `<button class="page-btn disabled" disabled>...</button>`;
                }
            }

            // Bouton Suivant
            paginationHtml += `
                <button class="page-btn ${currentPage === totalPages ? 'disabled' : ''}" 
                        onclick="${currentPage < totalPages ? `goToPage(${currentPage + 1})` : ''}">
                    →
                </button>
            `;

            paginationContainer.innerHTML = paginationHtml;
        }

        // Navigation
        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            currentSearchTerm = searchInput.value;
            currentPage = 1;
            renderArticles();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentSearchTerm = '';
            currentPage = 1;
            renderArticles();
        }

        function goToPage(page) {
            const filtered = filterArticles();
            const totalPages = getTotalPages(filtered);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderArticles();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Date du jour
        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date().toLocaleDateString('fr-FR', options);
            document.getElementById('currentDate').innerHTML = today.charAt(0).toUpperCase() + today.slice(1);
        }

        // Recherche au clic sur entrée
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        performSearch();
                    }
                });
            }
        });

        // Initialisation
        initArticles();
        updateDate();
        renderArticles();

        // Exposer les fonctions globalement
        window.performSearch = performSearch;
        window.clearSearch = clearSearch;
        window.goToPage = goToPage;
    </script>
</body>

</html>
