<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Horizon Info | Connexion Rédaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/bo-styles.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>Horizon<span>Info</span></h1>
                <p>Espace rédaction & administration</p>
            </div>

            <div class="login-body">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="input-group-custom">
                        <i class="bi bi-envelope-fill"></i>
                        <input type="email" id="email" placeholder="Adresse email professionnelle" autocomplete="email" required>
                    </div>
                    <div class="input-group-custom">
                        <i class="bi bi-lock-fill"></i>
                        <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" required>
                    </div>

                    <div class="login-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe"> Se souvenir de moi
                        </label>
                        <a href="#" class="forgot-link">Mot de passe oublié ?</a>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="bi bi-box-arrow-in-right"></i> Se connecter
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <p><i class="bi bi-shield-check"></i> Connexion sécurisée · CMS Horizon Info v2.0</p>
            </div>
        </div>
    </div>
</body>
</html>
